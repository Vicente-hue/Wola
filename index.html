<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Debes un Beso - Animación de Corazón</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #010101; /* Fondo oscuro similar al de Finterdev */
            font-family: 'Times New Roman', Times, serif; /* Estilo romántico/escrito */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Coloca las partículas detrás del texto */
        }
        #text-container {
            position: absolute;
            top: 15%; /* Posicion similar a la del video */
            width: 100%;
            text-align: center;
            z-index: 2; /* Coloca el texto delante de las partículas */
            pointer-events: none; /* Deja pasar los clics */
        }
        #text {
            color: #4df; /* Color azul neón */
            font-size: 3rem;
            text-shadow: 0 0 10px #4df, 0 0 20px #4df, 0 0 30px #4df, 0 0 40px #4df; /* Efecto de brillo */
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="text-container">
        <div id="text">Me debes un beso</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        const particlesArray = [];
        const heartPoints = [];
        const numParticles = 3000; // Aumentar para un corazón más denso
        const textHeightOffset = canvas.height * 0.2; // Ajustar a la posición del texto

        // Color de partículas basado en el video
        const particleColor = 'rgba(77, 221, 255, 0.8)'; // Azul neón brillante
        const particleGlow = 'rgba(77, 221, 255, 1)';

        // 1. Definición del Punto (adaptado del video en image_0.png)
        var Point = (function () {
            function Point(x, y) {
                this.x = (typeof x !== 'undefined') ? x : 0;
                this.y = (typeof y !== 'undefined') ? y : 0;
            }
            Point.prototype.clone = function () {
                return new Point(this.x, this.y);
            };
            return Point;
        })();

        // 2. Generación de Puntos para el Corazón
        function getHeartPoint(t) {
            // Ecuaciones paramétricas para un corazón
            // x = 16 * sin^3(t)
            // y = 13 * cos(t) - 5 * cos(2t) - 2 * cos(3t) - cos(4t)
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            // Escalado y centrado
            return new Point(x * 15, -y * 15);
        }

        // Generar puntos para el contorno del corazón
        for (let t = 0; t < Math.PI * 2; t += 0.01) {
            heartPoints.push(getHeartPoint(t));
        }

        // 3. Clase Partícula
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = particleColor;
                this.glowColor = particleGlow;
                
                // El objetivo es un punto aleatorio del contorno del corazón
                this.target = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                this.velocityX = (this.target.x + canvas.width / 2 - this.x) / 50;
                this.velocityY = (this.target.y + canvas.height / 2 + textHeightOffset - this.y) / 50;
                this.opacity = 0; // Empieza invisible
                this.fadeInSpeed = 0.02;
            }

            update() {
                // Movimiento inicial de puntos aleatorios a los del corazón
                this.x += this.velocityX;
                this.y += this.velocityY;

                // Física simple de partículas: frenado con el tiempo
                this.velocityX *= 0.98;
                this.velocityY *= 0.98;

                // Al llegar cerca del objetivo, añadir vagabundeo sutil y desvanecimiento
                if (Math.abs(this.velocityX) < 0.1 && Math.abs(this.velocityY) < 0.1) {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    // Aplicar fuerzas sutiles para que vaguen cerca del corazón
                    this.x += (Math.random() - 0.5) * 0.5;
                    this.y += (Math.random() - 0.5) * 0.5;

                    // Desvanecimiento lento
                    this.opacity -= 0.005;
                } else if (this.opacity < 1) {
                    // Desvanecimiento inicial
                    this.opacity += this.fadeInSpeed;
                }

                if (this.opacity < 0) {
                    this.opacity = 0;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('0.8', this.opacity.toFixed(2));
                
                // Establecer efecto de brillo para cada partícula
                ctx.shadowBlur = this.size * 5;
                ctx.shadowColor = this.glowColor;
                
                ctx.fill();
                
                // Resetear sombra para rendimiento
                ctx.shadowBlur = 0;
            }
        }

        // 4. Inicialización
        function init() {
            particlesArray.length = 0;
            for (let i = 0; i < numParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // 5. Bucle de Animación
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
